{% extends "base.html" %}

{% block content %}
<h2>Мои записи</h2>

{% if entries %}
    {% for entry in entries %}
    <div class="entry-card">
        <h3>{{ entry.title }}</h3>
        <p class="date">{{ entry.date }}</p>
        <div class="actions">
            <a href="{{ url_for('detail', entry_id=loop.index0) }}">📖 Читать</a>
            <form method="POST" action="{{ url_for('delete_entry', entry_id=loop.index0) }}" style="display:inline;">
                <button type="submit" class="delete-btn" onclick="return confirm('Удалить запись?')">🗑 Удалить</button>
            </form>
        </div>
    </div>
    {% endfor %}
{% else %}
    <p class="empty">Пока нет записей. <a href="{{ url_for('add_entry') }}">Создайте первую!</a></p>
{% endif %}
{% endblock %}
